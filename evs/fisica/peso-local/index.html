<!DOCTYPE html>
<html>
<head>
	<title>Cálculo do Peso</title>
</head>
<body>
	<h1 align="center">Cálculo do <font color="#000080">Peso</font> <font color="#0000FF">Local</font> de um 
	Objeto</h1>
	<p align="center">Prof. Dr. Luciano Soares Pedroso</p>
	<p align="center">2021</p>
	<form>
		<p align="center">
		<label for="massa">Massa do objeto (em kg):</label>
		<input type="number" id="massa" name="massa"><br><br>
		<button type="button" onclick="obterLocalizacao()">Obter Localizaçăo e Calcular Peso</button>
		</p>
		<p id="resultado" align="center"></p>
	</form>

	<script>
		var g0 = 9.8; // valor da aceleraçăo gravitacional na superfície da Terra
		var R = 6371; // raio médio da Terra em km

		function calcularPeso(latitude, longitude) {
			fetch('https://api.open-elevation.com/api/v1/lookup?locations=' + latitude + ',' + longitude)
			.then(response => response.json())
			.then(data => {
				var altitude = data.results[0].elevation / 1000; // converter altitude para quilômetros
				var massa = parseFloat(document.getElementById("massa").value);
				var g = g0 * (1 - altitude / R); // calcular a aceleraçăo gravitacional em funçăo da altitude
				var peso = massa * g; // calcular o peso
				var gravidadeLocal = g.toLocaleString('pt-BR', {minimumFractionDigits: 4, maximumFractionDigits: 4}); // formatar a aceleraçăo gravitacional com vírgula e 4 casas decimais
				var pesoFormatado = peso.toLocaleString('pt-BR', {minimumFractionDigits: 4, maximumFractionDigits: 4}); // formatar o peso com vírgula e 4 casas decimais
				var resultado = "O peso do objeto é: " + pesoFormatado + " N e a aceleraçăo gravitacional local é: " + gravidadeLocal + " m/s˛ ou N/kg.";
				document.getElementById("resultado").innerHTML = resultado;
			});
		}

		function obterLocalizacao() {
			navigator.geolocation.getCurrentPosition(function(position) {
				var latitude = position.coords.latitude;
				var longitude = position.coords.longitude;
				calcularPeso(latitude, longitude);
			});
		}
	</script>
</body>
</html>
